<!DOCTYPE html>
<html>
<head>
  <title>CSS Element Selector Example</title>
  <style>
    /* This is the element selector */
    p {
      text-align: center;
      color: red;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <p>This paragraph is styled using the element selector.</p>
  <p>All <code>&lt;p&gt;</code> elements on this page will have the same style.</p>
</body>
</html>
